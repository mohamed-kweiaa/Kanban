<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban</title>
  </head>
  <body class="flex flex-col min-h-screen">
    <button id="modal-show-trigger" data-modal-show="crud-modal" class="hidden"></button>
    <nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[95%] max-w-7xl z-50">
      <div class="bg-indigo-600/90 backdrop-blur-lg border border-white/20 rounded-2xl shadow-2xl px-6 py-3 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3 group">
          <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
            <i class="fa-solid fa-layer-group text-white text-xl"></i>
          </div>
          <div>
            <span class="block text-white font-bold text-xl leading-none">Kanban</span>
            <span class="text-white/60 text-[10px] uppercase tracking-[0.2em] font-bold">Pro Manager</span>
          </div>
        </a>

        <div class="flex items-center gap-4">
          <button
            class="bg-white cursor-pointer text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-xl font-bold text-sm transition-all duration-300 flex items-center gap-2 shadow-lg shadow-indigo-900/20 active:scale-95"
            id="add-task-btn"
            data-modal-target="crud-modal"
            type="button"
          >
            <i class="fa-solid fa-plus-circle"></i>
            <span>Create Task</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="flex-1 px-4 pt-28 pb-12 bg-[#f8fafc]">
      <!-- Background Decorative Blobs -->
      <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-100/50 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-100/50 rounded-full blur-[120px]"></div>
      </div>

      <div
        id="columns-container"
        class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8"
      >
        <!-- Columns will stay with the same IDs but improved classes -->
        <div class="flex flex-col h-full" data-status="todo">
          <div class="flex items-center justify-between mb-6 px-2">
            <div class="flex items-center gap-3">
              <span class="w-2.5 h-2.5 rounded-full bg-slate-400"></span>
              <h2 class="font-bold text-slate-700 text-lg">To Do</h2>
            </div>
            <p class="bg-white border border-slate-200 px-3 py-1 rounded-full text-xs font-bold text-slate-500 shadow-sm">0</p>
          </div>
          <div
            class="flex-1 space-y-4 min-h-[500px] rounded-3xl p-2 border-2 border-dashed border-slate-200/60 transition-colors"
            id="tasks-todo"
          >
            <!-- Content here -->
          </div>
        </div>

        <div class="flex flex-col h-full" data-status="in-progress">
          <div class="flex items-center justify-between mb-6 px-2">
            <div class="flex items-center gap-3">
              <span class="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
              <h2 class="font-bold text-slate-700 text-lg">In Progress</h2>
            </div>
            <p class="bg-white border border-slate-200 px-3 py-1 rounded-full text-xs font-bold text-slate-500 shadow-sm">0</p>
          </div>
          <div
            class="flex-1 space-y-4 min-h-[500px] rounded-3xl p-2 border-2 border-dashed border-slate-200/60 transition-colors"
            id="tasks-in-progress"
          >
            <!-- Content here -->
          </div>
        </div>

        <div class="flex flex-col h-full" data-status="completed">
          <div class="flex items-center justify-between mb-6 px-2">
            <div class="flex items-center gap-3">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
              <h2 class="font-bold text-slate-700 text-lg">Completed</h2>
            </div>
            <p class="bg-white border border-slate-200 px-3 py-1 rounded-full text-xs font-bold text-slate-500 shadow-sm">0</p>
          </div>
          <div
            class="flex-1 space-y-4 min-h-[500px] rounded-3xl p-2 border-2 border-dashed border-slate-200/60 transition-colors"
            id="tasks-completed"
          >
            <!-- Content here -->
          </div>
        </div>
      </div>
    </main>
    <section>
      <!-- Main modal -->
      <div
        id="crud-modal"
        tabindex="-1"
        aria-hidden="true"
        class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full"
      >
        <div class="relative p-4 w-full max-w-md max-h-full">
          <!-- Modal content -->
          <div
            class="relative bg-neutral-primary-soft border border-default rounded-base shadow-sm p-4 md:p-6"
          >
            <!-- Modal header -->
            <div
              class="flex items-center justify-between border-b border-default pb-4 md:pb-5"
            >
              <h3 class="text-lg font-medium text-heading">Create New Task</h3>
              <button
                type="button"
                class="text-body cursor-pointer bg-transparent hover:bg-neutral-tertiary hover:text-heading rounded-base text-sm w-9 h-9 ms-auto inline-flex justify-center items-center"
                data-modal-hide="crud-modal"
              >
                <svg
                  class="w-5 h-5"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18 17.94 6M18 18 6.06 6"
                  />
                </svg>
                <span class="sr-only">Close modal</span>
              </button>
            </div>
            <!-- Modal body -->
            <form action="#">
              <div class="grid gap-4 grid-cols-2 py-4 md:py-6">
                <div class="text-sm font-medium text-slate-700 mb-2 col-span-2">
                  <label
                    for="name"
                    class="block mb-2.5 text-sm font-medium text-heading"
                    ><i class="fa-solid fa-heading text-slate-400 me-2"></i>Task
                    Title <span class="text-red-500">*</span></label
                  >
                  <input
                    type="text"
                    name="name"
                    id="name"
                    class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body transition-colors"
                    placeholder="What needs to be done?"
                  />
                  <span
                    id="title-error"
                    class="hidden text-[10px] text-red-500 mt-1 ml-1 leading-none"
                    >Task title is required</span
                  >
                </div>
                <div class="col-span-2 sm:col-span-1">
                  <label
                    for="task-priority"
                    class="block mb-2.5 text-sm font-medium text-heading"
                    ><i class="fa-solid fa-flag text-slate-400 me-2"></i
                    >Priority</label
                  >
                  <select
                    name="task-priority"
                    id="task-priority"
                    class="bg-neutral-secondary-medium cursor-pointer border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                  >
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                  </select>
                </div>
                <div class="col-span-2 sm:col-span-1">
                  <label
                    for="task-due-date"
                    class="block mb-2.5 text-sm font-medium text-heading"
                    ><i class="fa-regular fa-calendar text-slate-400 me-2"></i
                    >Due Date
                  </label>
                  <input
                    type="date"
                    name="task-due-date"
                    id="task-due-date"
                    class="bg-neutral-secondary-medium cursor-pointer border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body transition-colors"
                  />
                  <span
                    id="date-error"
                    class="hidden text-[10px] text-red-500 mt-1 ml-1 leading-none"
                    >Due date cannot be in the past</span
                  >
                </div>
                <div class="col-span-2">
                  <label
                    for="description"
                    class="block mb-2.5 text-sm font-medium text-heading"
                    ><i class="fa-solid fa-align-left text-slate-400 me-2"></i
                    >Description</label
                  >
                  <textarea
                    id="description"
                    rows="4"
                    class="block resize-none bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-3.5 shadow-xs placeholder:text-body"
                    placeholder="Add more details about this task..."
                  ></textarea>
                </div>
              </div>
              <div
                class="flex items-center space-x-4 border-t border-default pt-4 md:pt-6"
              >
                <button
                  type="submit"
                  class="w-50 cursor-pointer text-center flex justify-center items-center text-white bg-brand hover:bg-brand-strong box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
                >
                  <svg
                    class="w-4 h-4 me-1.5 -ms-0.5"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="none"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M5 12h14m-7 7V5"
                    />
                  </svg>
                  Add Task
                </button>
                <button
                  data-modal-hide="crud-modal"
                  type="button"
                  class="text-body cursor-pointer text-center w-50 bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
                >
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
    <footer class="py-6 mt-auto border-t border-slate-200/60 bg-white/30 backdrop-blur-md">
      <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-slate-500 text-sm font-medium flex items-center gap-2">
          Made with
          <i class="fa-solid fa-heart text-rose-500 animate-pulse text-xs"></i>
          by <span class="text-indigo-600 font-bold">Mohamed Kweiaa</span>
        </p>
        <div class="flex items-center gap-6 text-slate-400">
          <p class="text-[11px] uppercase tracking-widest font-bold opacity-60">Kanban Manager</p>
        </div>
      </div>
    </footer>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
